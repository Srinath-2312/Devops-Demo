name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-docker-image:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t devops-demo:v1 .

      - name: Verify Docker Image
        run: |
          docker images